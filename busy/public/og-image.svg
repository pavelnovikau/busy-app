<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#090909"/>

  <!-- Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Rings (concentric) -->
  <g transform="translate(740, 315)">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#D14D41" stroke-width="1.5" opacity="0.25"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#DA702C" stroke-width="1.5" opacity="0.25"/>
    <circle cx="0" cy="0" r="70"  fill="none" stroke="#4385BE" stroke-width="1.5" opacity="0.25"/>
    <circle cx="0" cy="0" r="30"  fill="none" stroke="#878580" stroke-width="1.5" opacity="0.4"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#CECDC3" opacity="0.8"/>
    <!-- Sample nodes -->
    <circle cx="0"   cy="-70"  r="4" fill="#878580"/>
    <circle cx="70"  cy="0"    r="4" fill="#878580"/>
    <circle cx="-50" cy="55"   r="4" fill="#878580"/>
    <circle cx="80"  cy="-95"  r="5" fill="#D14D41"/>
    <circle cx="-110" cy="45"  r="5" fill="#D14D41"/>
    <circle cx="95"  cy="70"   r="5" fill="#DA702C"/>
    <circle cx="-80" cy="-100" r="5" fill="#DA702C"/>
    <circle cx="130" cy="-120" r="5" fill="#4385BE"/>
    <circle cx="-155" cy="90"  r="5" fill="#4385BE"/>
    <!-- Constellation path -->
    <polyline points="0,0 80,-95 95,70 -80,-100 130,-120" fill="none" stroke="#4385BE" stroke-width="1.2" opacity="0.5" stroke-dasharray="4 3"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="280" font-family="monospace" font-size="96" font-weight="700" fill="#CECDC3" letter-spacing="-2">BUSY</text>

  <!-- Subtitle -->
  <text x="122" y="330" font-family="monospace" font-size="18" fill="#878580" letter-spacing="4">СТРАТЕГИЯ ПРОДУКТА</text>

  <!-- Tag line -->
  <text x="122" y="400" font-family="monospace" font-size="13" fill="#575653">4 кольца · роадмап · прототипы · дизайн-система</text>

  <!-- Ring labels -->
  <text x="122" y="470" font-family="monospace" font-size="11" fill="#D14D41" opacity="0.8">R1 Software</text>
  <text x="230" y="470" font-family="monospace" font-size="11" fill="#575653">·</text>
  <text x="245" y="470" font-family="monospace" font-size="11" fill="#DA702C" opacity="0.8">R2 Platform</text>
  <text x="360" y="470" font-family="monospace" font-size="11" fill="#575653">·</text>
  <text x="375" y="470" font-family="monospace" font-size="11" fill="#4385BE" opacity="0.8">R3 Ecosystem</text>

  <!-- Domain -->
  <text x="122" y="540" font-family="monospace" font-size="13" fill="#403E3C">busy.bar · busy.app</text>
</svg>
