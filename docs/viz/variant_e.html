<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSY Bar · Transit Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #F8F7F3;
  --bg-2: #EEECE5;
  --bd:   #DDD9CF;
  --tx:   #111111;
  --tx-2: #5A5550;
  --tx-3: #B0AC9F;
  --sans: 'Geist', system-ui, sans-serif;
  --mono: 'Geist Mono', monospace;
  --red: #C8001A; --orange: #D45F00; --blue: #1A5EA6; --green: #2B7A3C;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }

#hd {
  position:fixed; top:0; left:0; right:0; z-index:500;
  height:46px; background:rgba(248,247,243,.96); border-bottom:1px solid var(--bd);
  backdrop-filter:blur(10px);
  display:flex; align-items:center; padding:0 22px; gap:0;
}
.hd-brand {
  font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:.15em; text-transform:uppercase;
  display:flex; align-items:center; gap:8px; padding-right:14px;
}
.hd-dot { width:7px; height:7px; border-radius:50%; background:var(--red); }
.hd-sep { width:1px; height:16px; background:var(--bd); margin:0 4px; }
.hd-lbl { font-family:var(--mono); font-size:9px; color:var(--tx-3); letter-spacing:.07em; padding-right:14px; }
.tab {
  font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.11em; text-transform:uppercase;
  padding:0 13px; height:46px; border:none; background:transparent;
  color:var(--tx-3); cursor:pointer; position:relative; transition:color .1s;
}
.tab:hover { color:var(--tx-2); }
.tab.on { color:var(--tx); }
.tab.on::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--red); }
.hd-r { margin-left:auto; display:flex; align-items:center; gap:8px; }
.hl-btn {
  font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  padding:0 10px; height:25px; border:1.5px solid var(--bd); border-radius:3px;
  background:transparent; color:var(--tx-3); cursor:pointer; transition:all .1s;
  display:flex; align-items:center; gap:5px;
}
.hl-btn:hover { border-color:var(--red); color:var(--tx-2); }
.hl-btn.on { background:rgba(200,0,26,.07); border-color:var(--red); color:var(--red); }
.hl-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

#views { position:fixed; top:46px; left:0; right:0; bottom:0; }
#map-view {
  position:absolute; inset:0;
  overflow-x:auto; overflow-y:auto;
  background:var(--bg);
}
#map-svg { display:block; min-width:1400px; min-height:520px; }

#ins-view { position:absolute; inset:0; display:none; overflow-y:auto; padding:40px 48px; }
#ins-view.on { display:block; }
.is-wrap { max-width:700px; }
.is-sec { margin-bottom:30px; }
.is-hd { font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--tx); padding-left:10px; border-left:2px solid var(--red); margin-bottom:12px; }
.is-card { background:#fff; border:1px solid var(--bd); border-radius:3px; padding:14px 16px; margin-bottom:10px; }
.is-card:hover { border-color:var(--tx-3); }
.is-title { font-family:var(--sans); font-size:14px; font-weight:600; color:var(--tx); margin-bottom:5px; }
.is-body  { font-family:var(--sans); font-size:13px; color:var(--tx-2); line-height:1.65; }
.is-body strong { color:var(--tx); font-weight:600; }
.itag { display:inline-block; font-family:var(--mono); font-size:8px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:1px 5px; border-radius:2px; margin:0 4px 0 0; }
.tr { background:rgba(200,0,26,.08); color:var(--red); }
.to { background:rgba(212,95,0,.08); color:var(--orange); }
.tb { background:rgba(26,94,166,.08); color:var(--blue); }
.tg { background:rgba(43,122,60,.08); color:var(--green); }

#dp {
  position:fixed; top:46px; right:0; bottom:0; width:310px; z-index:400;
  background:rgba(248,247,243,.98); border-left:1px solid var(--bd);
  backdrop-filter:blur(12px);
  transform:translateX(100%); transition:transform .18s; overflow-y:auto; padding:20px 18px;
}
#dp.open { transform:translateX(0); }
#dp-x {
  position:absolute; top:12px; right:12px; width:22px; height:22px;
  border:1px solid var(--bd); border-radius:2px; background:transparent;
  color:var(--tx-3); cursor:pointer; font-size:12px;
  display:flex; align-items:center; justify-content:center; transition:all .1s;
}
#dp-x:hover { border-color:var(--red); color:var(--tx); }
#dp-lines { display:flex; gap:5px; margin-bottom:8px; }
.dp-line-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
#dp-id   { font-family:var(--mono); font-size:8px; letter-spacing:.16em; color:var(--tx-3); margin-bottom:3px; }
#dp-name { font-family:var(--sans); font-size:16px; font-weight:600; color:var(--tx); padding-right:30px; margin-bottom:3px; }
#dp-ring { font-family:var(--mono); font-size:9px; color:var(--tx-3); padding-bottom:12px; border-bottom:1px solid var(--bd); margin-bottom:14px; }
.dp-r { display:flex; gap:8px; padding:5px 0; border-bottom:1px solid rgba(0,0,0,.04); align-items:baseline; }
.dp-r:last-child { border-bottom:none; }
.dp-l { font-family:var(--mono); font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx-3); min-width:60px; flex-shrink:0; padding-top:2px; }
.dp-v { font-family:var(--sans); font-size:12px; color:var(--tx-2); line-height:1.5; }
</style>
</head>
<body>

<div id="hd">
  <div class="hd-brand"><div class="hd-dot"></div>BUSY BAR</div>
  <div class="hd-sep"></div>
  <span class="hd-lbl">Product Strategy</span>
  <div class="hd-sep"></div>
  <button class="tab on" onclick="switchTab('map',this)">Transit Map</button>
  <button class="tab" onclick="switchTab('ins',this)">Insights</button>
  <div class="hd-r">
    <button class="hl-btn" id="hl" onclick="toggleHL()">
      <div class="hl-dot"></div>Focus Line
    </button>
    <div class="hd-sep"></div>
    <span style="font-family:var(--mono);font-size:8px;color:var(--tx-3);letter-spacing:.1em">2026 Q1</span>
  </div>
</div>

let hlOn = false;

function toggleHL() {
  hlOn = !hlOn;
  document.getElementById('hl').classList.toggle('on', hlOn);
  const svg = document.getElementById('map-svg');
  if (hlOn) {
    // Dim non-Focus stations
    svg.querySelectorAll('.st').forEach(el => {
      const id = el.dataset.id;
      const f = FEATURES[id];
      const onFocus = f && f.lines.includes('red');
      el.style.opacity = onFocus ? '1' : '0.2';
    });
    // Dim labels
    svg.querySelectorAll('text').forEach(el => { el.style.opacity = '0.25'; });
    // Show Focus line labels
    const focusIds = ['0.1','0.13','1.9','1.12','2.4','3.1','3.5','3.2'];
    svg.querySelectorAll('g').forEach(g => {
      const t = g.querySelector('text');
      if (!t) return;
      // heuristic: if g contains a text with anchor-name text, keep visible
    });
    // easier: keep all text visible, just fade non-focus circles
  } else {
    svg.querySelectorAll('.st').forEach(el => { el.style.opacity = '1'; });
    svg.querySelectorAll('text').forEach(el => { el.style.opacity = '1'; });
  }
}

function openDP(id) {
  const f = FEATURES[id];
  if (!f) return;
  const isA = ANCHORS.has(id);
  // Line dots
  const linesHTML = f.lines.map(l => `<div class="dp-line-dot" style="background:${LINE_COLORS[l]}" title="${LINE_NAMES[l]}"></div>`).join('');
  document.getElementById('dp-lines').innerHTML = linesHTML || '<div style="font-family:var(--mono);font-size:8px;color:var(--tx-3)">—</div>';
  document.getElementById('dp-id').textContent = id;
  document.getElementById('dp-name').textContent = f.n;
  document.getElementById('dp-ring').textContent = RING_NAMES[f.r];
  document.getElementById('dp-body').innerHTML = `
    <div class="dp-r"><div class="dp-l">Priority</div><div class="dp-v">${f.p==='●'?'High — Ship':f.p==='◐'?'Medium — Plan':'Low — Future'}</div></div>
    ${f.ph?`<div class="dp-r"><div class="dp-l">Phase</div><div class="dp-v">${f.ph}</div></div>`:''}
    <div class="dp-r"><div class="dp-l">Lines</div><div class="dp-v">${f.lines.map(l=>LINE_NAMES[l]).join(', ')||'—'}</div></div>
    ${isA?`<div class="dp-r"><div class="dp-l">Role</div><div class="dp-v" style="color:var(--red)">★ Focus Constellation Anchor</div></div>`:''}
    <div class="dp-r"><div class="dp-l">Context</div><div class="dp-v">${f.role}</div></div>
  `;
  document.getElementById('dp').classList.add('open');
}
function closeDP() { document.getElementById('dp').classList.remove('open'); }

function switchTab(t, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('map-view').style.display = t==='map' ? 'block' : 'none';
  document.getElementById('ins-view').classList.toggle('on', t==='ins');
}

function buildInsights() {
  document.getElementById('is-inner').innerHTML = INSIGHTS.map(s => `
    <div class="is-sec">
      <div class="is-hd">${s.h}</div>
      ${s.cards.map(c=>`
        <div class="is-card">
          <div class="is-title"><span class="itag ${c.tc}">${c.tl}</span>${c.title}</div>
          <div class="is-body">${c.body}</div>
        </div>`).join('')}
    </div>`).join('');
}
buildInsights();
