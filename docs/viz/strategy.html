<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSY Bar · Product Strategy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────────────── */
:root {
  --font: 'Geist', system-ui, sans-serif;
  --mono: 'Geist Mono', monospace;
  --radius: 14px;
  --transition: .15s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg:      #090909;
  --bg-2:    #111111;
  --surface: #171717;
  --border:  #262626;
  --border-2:#343434;
  --tx:      #EEEADF;
  --tx-2:    #A19B90;
  --tx-3:    #5D5A55;
  --red:     #ED0018;
  --red-dim: rgba(237,0,24,.12);
  --or:      #EA5212;
  --or-dim:  rgba(234,82,18,.10);
  --bl:      #4385BE;
  --bl-dim:  rgba(67,133,190,.10);
  --gr:      #66800B;
  --gr-dim:  rgba(102,128,11,.12);
  --ye:      #AD8301;
  --pu:      #8B7EC8;
  --r0-fill: #1A1A1A;
  --r0-stroke:#3A3A3A;
  --shadow-soft: 0 20px 50px rgba(0, 0, 0, .36);
  --shadow-card: 0 10px 24px rgba(0, 0, 0, .24);
}
[data-theme="light"] {
  --bg:      #FBFAF7;
  --bg-2:    #F5F2EB;
  --surface: #FFFFFF;
  --border:  #E8E1D5;
  --border-2:#D4CABA;
  --tx:      #111111;
  --tx-2:    #666666;
  --tx-3:    #B9B2A5;
  --red:     #C8001A;
  --red-dim: rgba(200,0,26,.08);
  --or:      #C44000;
  --or-dim:  rgba(196,64,0,.08);
  --bl:      #205EA6;
  --bl-dim:  rgba(32,94,166,.08);
  --gr:      #66800B;
  --gr-dim:  rgba(102,128,11,.10);
  --ye:      #AD8301;
  --pu:      #5E409D;
  --r0-fill: #EBEBEB;
  --r0-stroke:#AAAAAA;
  --shadow-soft: 0 20px 50px rgba(17, 17, 17, .06);
  --shadow-card: 0 10px 24px rgba(17, 17, 17, .04);
}

/* ─── RESET ──────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--tx); font-family:var(--font); }

/* ─── HEADER ─────────────────────────────────────────────────────── */
#hd {
  position:fixed; top:0; left:0; right:0; z-index:400;
  height:56px; background:color-mix(in srgb, var(--bg) 88%, white);
  border-bottom:1px solid color-mix(in srgb, var(--border) 72%, transparent);
  backdrop-filter: blur(14px);
  display:flex; align-items:center; padding:0 24px; gap:0;
}
.hd-brand {
  font-family:var(--mono); font-size:12px; font-weight:600;
  letter-spacing:.12em; text-transform:uppercase; color:var(--tx);
  display:flex; align-items:center; gap:8px; flex-shrink:0; padding-right:16px;
}
.hd-dot { width:8px; height:8px; border-radius:50%; background:var(--red); flex-shrink:0; }
.hd-sep { width:1px; height:20px; background:var(--border); margin:0 4px; flex-shrink:0; }
.tab-btn {
  font-family:var(--mono); font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:.1em; padding:0 18px; height:56px; border:none; background:transparent;
  color:var(--tx-2); cursor:pointer; position:relative; transition:color var(--transition); white-space:nowrap;
}
.tab-btn:hover { color:var(--tx); }
.tab-btn.active { color:var(--tx); }
.tab-btn.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--red); }
.hd-right { margin-left:auto; display:flex; align-items:center; gap:6px; flex-shrink:0; }
.zoom-btn {
  width:32px; height:32px; border:1px solid var(--border); border-radius:10px;
  background:var(--surface); cursor:pointer; font:600 13px/1 var(--mono); color:var(--tx-2);
  display:flex; align-items:center; justify-content:center; transition:all var(--transition);
}
.zoom-btn:hover { background:var(--bg-2); color:var(--tx); }
#zoom-val { font:500 10px/1 var(--mono); color:var(--tx-3); min-width:36px; text-align:center; }
.theme-btn {
  height:32px; padding:0 12px; border:1px solid var(--border); border-radius:10px;
  background:var(--surface); cursor:pointer; font:500 11px/1 var(--mono); color:var(--tx-2);
  letter-spacing:.06em; text-transform:uppercase; transition:all var(--transition);
}
.theme-btn:hover { background:var(--bg-2); color:var(--tx); }

/* ─── LAYOUT ─────────────────────────────────────────────────────── */
#main { position:fixed; top:56px; left:0; right:0; bottom:84px; display:flex; }
#sidebar {
  width:280px; flex-shrink:0; background:linear-gradient(180deg, color-mix(in srgb, var(--surface) 70%, var(--bg)) 0%, var(--bg) 100%);
  border-right:1px solid color-mix(in srgb, var(--border) 72%, transparent);
  overflow-y:auto; padding:20px 16px 24px;
}
#center { flex:1; position:relative; overflow:hidden; background:
  radial-gradient(circle at 50% 0%, rgba(255,255,255,.92), transparent 34%),
  linear-gradient(180deg, rgba(255,255,255,.5), rgba(255,255,255,0)); }
[data-theme="dark"] #center {
  background:
    radial-gradient(circle at 50% 4%, rgba(255,255,255,.08), transparent 28%),
    radial-gradient(circle at 50% 52%, rgba(255,255,255,.03), transparent 42%),
    linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0)),
    #0b0b0b;
}

/* ─── SIDEBAR ────────────────────────────────────────────────────── */
.sb-label {
  font-family:var(--mono); font-size:10px; font-weight:600;
  letter-spacing:.14em; text-transform:uppercase; color:var(--tx-3); margin-bottom:10px;
}
.focus-toggle {
  width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
  height:40px; margin-bottom:18px; border:1px solid color-mix(in srgb, var(--border-2) 76%, transparent); border-radius:999px;
  background:var(--surface); color:var(--tx); cursor:pointer;
  font:700 11px/1 var(--mono); letter-spacing:.14em; text-transform:uppercase;
  transition:all var(--transition); box-shadow:var(--shadow-card);
}
.focus-toggle:hover { background:var(--bg-2); }
[data-theme="dark"] .focus-toggle { background:#141414; border-color:#2a2a2a; }
[data-theme="dark"] .focus-toggle:hover { background:#1a1a1a; }
.focus-toggle.active {
  background:var(--red); border-color:var(--red); color:#fff;
  box-shadow:0 0 0 1px rgba(237,0,24,.15), 0 10px 30px rgba(237,0,24,.18);
}
.focus-toggle-dot {
  width:8px; height:8px; border-radius:50%; background:var(--tx-3); transition:all var(--transition);
}
.focus-toggle.active .focus-toggle-dot {
  background:#fff;
  box-shadow:0 0 12px rgba(255,255,255,.65);
}
.focus-copy {
  margin:0 0 18px; padding:14px 14px 15px; border:1px solid color-mix(in srgb, var(--border) 70%, transparent);
  border-radius:18px; background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(245,242,235,.96)); display:none;
  box-shadow:var(--shadow-card);
}
[data-theme="dark"] .focus-copy {
  background:linear-gradient(180deg, rgba(24,24,24,.96), rgba(16,16,16,.96));
  border-color:#262626;
}
.focus-copy.show { display:block; }
.focus-copy-kicker {
  font:700 10px/1 var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--red);
  margin-bottom:6px;
}
.focus-copy-title { font-size:14px; font-weight:600; color:var(--tx); margin-bottom:5px; }
.focus-copy-body { font-size:12px; line-height:1.55; color:var(--tx-2); }
.sb-item {
  display:flex; align-items:flex-start; gap:10px; padding:9px 10px;
  border-radius:12px; cursor:pointer; transition:all var(--transition); margin-bottom:4px;
}
.sb-item:hover { background:rgba(255,255,255,.75); }
.sb-item.active { background:rgba(255,255,255,.9); outline:1px solid color-mix(in srgb, var(--border-2) 70%, transparent); box-shadow:var(--shadow-card); }
.sb-item.dimmed { opacity:.3; }
[data-theme="dark"] .sb-item:hover { background:rgba(255,255,255,.04); }
[data-theme="dark"] .sb-item.active { background:rgba(255,255,255,.06); }
.sb-emoji {
  font-family:var(--mono); font-size:15px; line-height:1; flex-shrink:0; margin-top:2px;
  min-width:28px; color:var(--tx-3); letter-spacing:0; text-transform:none;
}
.sb-info { flex:1; min-width:0; }
.sb-name { font-size:14px; font-weight:600; color:var(--tx); line-height:1.25; }
.sb-role { font-size:12px; color:var(--tx-2); line-height:1.35; margin-top:2px; }
.sb-p { font-family:var(--mono); font-size:10px; font-weight:700; padding:2px 5px; border-radius:2px; flex-shrink:0; margin-top:3px; }
.p0 { background:var(--red-dim); color:var(--red); }
.p1 { background:var(--or-dim); color:var(--or); }
.p2 { background:var(--bl-dim); color:var(--bl); }
.p3 { background:var(--bg-2); color:var(--tx-3); }
.sb-div { height:1px; background:color-mix(in srgb, var(--border) 78%, transparent); margin:14px 0; }
.legend-row { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
.leg-ring { width:12px; height:12px; border-radius:50%; border:2px solid; flex-shrink:0; }
.leg-txt { font-family:var(--mono); font-size:10px; color:var(--tx-2); }
.subphase-legend { margin-top:10px; padding-top:10px; border-top:1px solid color-mix(in srgb, var(--border) 78%, transparent); }
.subphase-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.subphase-dot {
  width:12px; height:12px; border-radius:50%; flex-shrink:0;
  border:1.1px solid var(--red);
}
.subphase-dot.primary { background:var(--red); border-color:var(--red); }
.subphase-dot.secondary { background:var(--red-dim); }
.subphase-txt { font-family:var(--mono); font-size:10px; color:var(--tx-2); }

/* ─── SVG DIAGRAM ────────────────────────────────────────────────── */
#diagram { width:100%; height:100%; display:block; cursor:grab; }
#diagram.panning { cursor:grabbing; }

/* ─── ROADMAP VIEW ───────────────────────────────────────────────── */
#roadmap-view {
  display:none; height:100%; overflow-x:auto; overflow-y:hidden;
  padding:34px 40px; gap:0;
}
.rm-cols { display:flex; gap:0; height:100%; min-width:max-content; }
.rm-col {
  width:290px; flex-shrink:0; display:flex; flex-direction:column;
  border-right:1px solid color-mix(in srgb, var(--border) 72%, transparent); padding:0 24px; padding-right:34px; overflow-y:auto;
}
.rm-col:last-child { border-right:none; }
.rm-col-head { margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid color-mix(in srgb, var(--border) 72%, transparent); }
.rm-ring-label {
  font-family:var(--mono); font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.1em; margin-bottom:4px;
}
.rm-ring-sub { font-size:12px; color:var(--tx-2); }
.rm-gate {
  font-family:var(--mono); font-size:10px; color:var(--tx-3); margin-top:6px;
  padding:5px 9px; background:rgba(255,255,255,.82); border-radius:999px; display:inline-block;
  border:1px solid color-mix(in srgb, var(--border) 76%, transparent);
}
.rm-group { margin-bottom:18px; }
.rm-group-label {
  font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:.1em;
  text-transform:uppercase; color:var(--tx-3); margin-bottom:6px;
}
.rm-group[data-phase="1.5"] .rm-group-label,
.rm-group[data-phase="2.5"] .rm-group-label { opacity:.68; }
.rm-feat {
  display:flex; align-items:flex-start; gap:9px; padding:9px 10px;
  border-radius:14px; margin-bottom:4px; cursor:pointer;
  transition:background var(--transition);
}
.rm-feat:hover { background:rgba(255,255,255,.76); }
.rm-feat.focus-dim { opacity:.25; }
.rm-feat.focus-node {
  background:color-mix(in srgb, var(--red) 6%, white);
  outline:1px solid color-mix(in srgb, var(--red) 22%, transparent);
}
.rm-feat.focus-anchor {
  background:color-mix(in srgb, var(--red) 10%, white);
  outline:1px solid color-mix(in srgb, var(--red) 32%, transparent);
  box-shadow:var(--shadow-card);
}
[data-theme="dark"] .rm-feat:hover { background:rgba(255,255,255,.04); }
[data-theme="dark"] .rm-feat.focus-node {
  background:rgba(237,0,24,.08);
  outline:1px solid rgba(237,0,24,.22);
}
[data-theme="dark"] .rm-feat.focus-anchor {
  background:rgba(237,0,24,.13);
  outline:1px solid rgba(237,0,24,.34);
}
.rm-group.focus-dim { opacity:.35; }
.rm-prio { font-family:var(--mono); font-size:12px; flex-shrink:0; margin-top:1px; }
.rm-feat-name { font-size:13px; color:var(--tx); line-height:1.45; }
.rm-feat-note { font-size:12px; color:var(--tx-2); margin-top:2px; line-height:1.45; }

/* ─── INSIGHTS VIEW ──────────────────────────────────────────────── */
#insights-view {
  display:none; height:100%; overflow-y:auto; padding:40px 48px;
}
.ins-inner { max-width:760px; }
.ins-section { margin-bottom:36px; }
.ins-h {
  font-family:var(--mono); font-size:12px; font-weight:700; text-transform:uppercase;
  letter-spacing:.1em; color:var(--tx); padding-left:12px;
  border-left:3px solid var(--red); margin-bottom:14px;
}
.ins-card {
  background:rgba(255,255,255,.92); border:1px solid color-mix(in srgb, var(--border) 70%, transparent); border-radius:18px;
  padding:18px 18px; margin-bottom:12px; box-shadow:var(--shadow-card);
}
[data-theme="dark"] .ins-card {
  background:rgba(22,22,22,.92);
  border-color:#262626;
}
.ins-card-title { font-size:15px; font-weight:600; color:var(--tx); margin-bottom:6px; }
.ins-card-body { font-size:14px; color:var(--tx-2); line-height:1.65; }
.ins-card-body strong { color:var(--tx); font-weight:600; }
.ins-tag {
  display:inline-block; font-family:var(--mono); font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em; padding:1px 6px; border-radius:2px;
  margin:0 3px 0 0;
}
.tag-red { background:var(--red-dim); color:var(--red); }
.tag-or  { background:var(--or-dim);  color:var(--or); }
.tag-bl  { background:var(--bl-dim);  color:var(--bl); }
.tag-gr  { background:var(--gr-dim);  color:var(--gr); }
.ins-quote {
  border-left:3px solid var(--border-2); padding:10px 16px;
  font-size:14px; color:var(--tx-2); background:var(--bg-2);
  border-radius:0 var(--radius) var(--radius) 0; margin:10px 0; line-height:1.6;
}
.ins-quote em { color:var(--tx); font-style:normal; font-weight:600; }

/* ─── BOTTOM TIMELINE ────────────────────────────────────────────── */
#timeline {
  position:fixed; bottom:0; left:280px; right:0; z-index:300; height:84px;
  background:color-mix(in srgb, var(--bg) 88%, white); border-top:1px solid color-mix(in srgb, var(--border) 72%, transparent);
  backdrop-filter: blur(14px);
  display:flex; align-items:center; padding:0 28px; gap:0;
}
.tl-block {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:8px 10px; border-radius:var(--radius); cursor:pointer;
  transition:background var(--transition); position:relative;
}
.tl-block:hover { background:rgba(255,255,255,.72); }
.tl-block.active { background:rgba(255,255,255,.88); outline:1px solid color-mix(in srgb, var(--border-2) 68%, transparent); box-shadow:var(--shadow-card); }
[data-theme="dark"] .tl-block:hover { background:rgba(255,255,255,.04); }
[data-theme="dark"] .tl-block.active { background:rgba(255,255,255,.06); }
.tl-label { font-family:var(--mono); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin-bottom:3px; }
.tl-sub { font-size:12px; color:var(--tx-2); text-align:center; line-height:1.35; }
.tl-arrow { color:var(--tx-3); font-size:16px; flex-shrink:0; padding:0 4px; align-self:center; }
.tl-focus-sub {
  font-family:var(--mono); font-size:9px; color:var(--red);
  letter-spacing:.06em; margin-top:2px; display:none;
}
.tl-focus-sub.show { display:block; }

/* ─── TOOLTIP ────────────────────────────────────────────────────── */
#tooltip {
  position:fixed; z-index:600; background:var(--surface);
  border:1px solid color-mix(in srgb, var(--border-2) 70%, transparent); border-radius:16px;
  padding:10px 14px; max-width:280px;
  box-shadow:var(--shadow-soft);
  pointer-events:none; opacity:0; transition:opacity .1s;
  font-size:13px; line-height:1.55; color:var(--tx-2);
}
#tooltip.show { opacity:1; }
.tt-title { font-family:var(--mono); font-size:12px; font-weight:700; color:var(--tx); margin-bottom:5px; }

/* ─── DETAIL PANEL ───────────────────────────────────────────────── */
#detail {
  position:fixed; top:56px; right:0; bottom:84px; width:336px; z-index:350;
  background:color-mix(in srgb, var(--bg) 85%, white); border-left:1px solid color-mix(in srgb, var(--border) 72%, transparent);
  backdrop-filter: blur(14px);
  transform:translateX(100%); transition:transform .22s cubic-bezier(.4,0,.2,1);
  overflow-y:auto; padding:22px 18px;
}
[data-theme="dark"] #detail {
  background:rgba(10,10,10,.88);
  border-left-color:#262626;
}
#detail.open { transform:translateX(0); }
#detail-close {
  position:absolute; top:12px; right:12px; width:24px; height:24px;
  border:1px solid var(--border); border-radius:10px; background:var(--surface);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:13px; color:var(--tx-3); transition:all var(--transition);
}
#detail-close:hover { background:var(--surface); color:var(--tx); }
#detail-title {
  font-family:var(--mono); font-size:13px; font-weight:700; text-transform:uppercase;
  letter-spacing:.08em; color:var(--tx); margin-bottom:14px; padding-right:32px;
  padding-bottom:12px; border-bottom:1px solid var(--border);
}
.dt-section { margin-bottom:16px; }
.dt-sec-label {
  font-family:var(--mono); font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.12em; color:var(--tx-3); margin-bottom:6px;
}
.dt-item {
  display:flex; gap:7px; align-items:baseline; padding:3px 0;
  border-bottom:1px solid var(--border); font-size:13px; color:var(--tx); line-height:1.45;
}
.dt-item:last-child { border-bottom:none; }
.dt-prio { font-family:var(--mono); font-size:12px; flex-shrink:0; }
.dt-note { font-size:12px; color:var(--tx-2); margin-left:auto; flex-shrink:0; }
.dt-metric {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:10px 12px; margin-bottom:8px; font-size:13px; color:var(--tx-2); line-height:1.55;
  box-shadow:var(--shadow-card);
}
[data-theme="dark"] .dt-metric { border-color:#262626; }
.dt-metric strong { color:var(--tx); display:block; font-size:12px; font-weight:600; margin-bottom:3px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="hd">
  <div class="hd-brand"><span class="hd-dot"></span>BUSY BAR</div>
  <div class="hd-sep"></div>
  <span style="font-family:var(--mono);font-size:10px;color:var(--tx-2);letter-spacing:.04em;padding-right:12px;">Product Strategy</span>
  <div class="hd-sep"></div>
  <button class="tab-btn active" onclick="switchTab('map')">Экосистема</button>
  <button class="tab-btn" onclick="switchTab('roadmap')">Роадмап</button>
  <button class="tab-btn" onclick="switchTab('insights')">Инсайты</button>
  <div class="hd-right">
    <button class="zoom-btn" onclick="zoom(.88)">−</button>
    <span id="zoom-val">100%</span>
    <button class="zoom-btn" onclick="zoom(1.14)">+</button>
    <button class="zoom-btn" onclick="zoomReset()" title="Reset">⊙</button>
    <div class="hd-sep"></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">Dark</button>
  </div>
</div>

<!-- LAYOUT -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <button class="focus-toggle" id="focus-toggle" onclick="toggleFocusMode()" title="Highlight critical path">
      <span class="focus-toggle-dot"></span>
      <span>Focus</span>
    </button>
    <div class="focus-copy" id="focus-copy">
      <div class="focus-copy-kicker">Critical Path</div>
      <div class="focus-copy-title">Focus Constellation</div>
      <div class="focus-copy-body">A semantic product spine: ritual becomes presence, presence becomes platform, platform becomes intelligence. Supporting nodes stay close to each stage instead of hijacking the whole map.</div>
    </div>
    <div class="sb-label">Стейкхолдеры</div>
    <div id="sb-list"></div>
    <div class="sb-div"></div>
    <div class="sb-label">Кольца</div>
    <div id="ring-legend"></div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="roadmap-view"><div class="rm-cols" id="rm-cols"></div></div>

// ─── SVG DIAGRAM ──────────────────────────────────────────────────────
function buildDiagram() {
  const svg = document.getElementById('diagram');
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);

  let html = `<g id="g-root" transform="translate(0,0) scale(1)">`;
  const dotPositions = new Map();

  // ── Ghost ring hit-areas (for ring click between dots) ───────────────
  // Drawn first (bottom layer), very faint
  [...RINGS].reverse().forEach(r => {
    html += `<circle class="ring-hit" data-ring="${r.id}"
      cx="${CX}" cy="${CY}" r="${r.r}"
      fill="${r.dim}" fill-opacity="0.025"
      stroke="${r.color}" stroke-width="1" stroke-opacity="0.12"
      style="cursor:inherit;transition:opacity .15s"
      onclick="selectRing('${r.id}')"/>`;
  });

  // ── Center CORE label (hidden in focus mode — replaced by Status Engine hub) ──
  if (!focusMode) {
    html += `<text x="${CX}" y="${CY+4}" text-anchor="middle"
      font-family="var(--mono)" font-size="10" font-weight="700" letter-spacing="1.5"
      fill="var(--tx-2)" opacity="0.5" style="pointer-events:none">CORE</text>`;
  }

  // ── Feature dots on rings ────────────────────────────────────────────
  const DOT_R       = 5.5;
  const DOT_R_HOVER = 7;
  const LABEL_OFFSET = 22; // px beyond dot center from ring center

  RINGS.forEach(ring => {
    const n = ring.features.length;
    ring.features.forEach((feat, i) => {
      const angleRad = ((2 * Math.PI) / n) * i - Math.PI / 2;
      const cosA = Math.cos(angleRad);
      const sinA = Math.sin(angleRad);

      // Dot position exactly on ring circumference
      const dx = CX + ring.r * cosA;
      const dy = CY + ring.r * sinA;

      // Label position: ring.r + LABEL_OFFSET from center
      const labelDist = ring.r + LABEL_OFFSET;
      const lx = CX + labelDist * cosA;
      const ly = CY + labelDist * sinA;

      // text-anchor
      let anchor = 'middle';
      if (cosA > 0.25)  anchor = 'start';
      if (cosA < -0.25) anchor = 'end';

      // dy offset for id-line
      let idDy = 0;
      if (sinA > 0.2)  idDy =  0;   // below center → id on top of name, handled via tspan
      if (sinA < -0.2) idDy =  0;

      // For two-line label: id line baseline shift
      const nameDy = sinA > 0.2 ? 12 : (sinA < -0.2 ? -4 : 8);
      const idDyVal = nameDy - 11;

      const dotKey = `${ring.id}:${feat.id}`;
      dotPositions.set(dotKey, { x:dx, y:dy, ring:ring.id });
      const phase = feat.phase || null;
      const phaseSecondary = phase === '1.5' || phase === '2.5';
      const dotFill = phaseSecondary ? ring.dim : ring.color;
      const dotStroke = phaseSecondary ? ring.color : 'none';
      const dotStrokeWidth = phaseSecondary ? '1.1' : '0';
      const idFill = phaseSecondary ? 'var(--tx-2)' : ring.color;
      const labelFill = phaseSecondary ? 'var(--tx-2)' : 'var(--tx-2)';
      const labelOpacity = phaseSecondary ? '.78' : '1';

      html += `
      <g class="feat-dot-group" data-ring="${ring.id}" data-dot="${dotKey}"
         style="cursor:inherit"
         onmouseenter="showDotTooltip(event,'${dotKey}')"
         onmouseleave="hideTooltip()"
         onclick="selectDot(event,'${dotKey}')">
        <circle class="feat-dot" data-ring="${ring.id}" data-dot="${dotKey}"
          cx="${dx}" cy="${dy}" r="${DOT_R}"
          fill="${dotFill}" stroke="${dotStroke}" stroke-width="${dotStrokeWidth}"
          style="transition:r .12s,opacity .15s"/>
        <text style="pointer-events:none" fill="${idFill}" opacity="${labelOpacity}"
          font-family="var(--mono)" font-size="8" font-weight="700"
          x="${lx}" y="${ly + idDyVal}" text-anchor="${anchor}">${feat.id}</text>
        <text style="pointer-events:none" fill="${labelFill}" opacity="${labelOpacity}"
          font-family="var(--font)" font-size="8.5"
          x="${lx}" y="${ly + nameDy}" text-anchor="${anchor}">${feat.short}</text>
      </g>`;
    });
  });

  SUBPHASES.forEach(phase => {
    const ring = RINGS.find(r => r.id === phase.ring);
    if (!ring) return;
    html += `<text x="${phase.x}" y="${phase.y}" text-anchor="${phase.align}"
      font-family="var(--mono)" font-size="9.5" font-weight="700" letter-spacing=".14em"
      fill="${ring.color}" opacity=".85" style="pointer-events:none">${phase.code}</text>`;
    html += `<text x="${phase.x}" y="${phase.y + 15}" text-anchor="${phase.align}"
      font-family="var(--font)" font-size="12.5" font-weight="600"
      fill="var(--tx-2)" opacity=".92" style="pointer-events:none">${phase.label}</text>`;
  });

  if (focusMode) {
    html += `<g class="focus-path-layer">`;
    const allFocusDots = new Set(FOCUS_PATH.nodes);
    FOCUS_PATH.edges.forEach(([from, to, kind]) => {
      const a = dotPositions.get(from);
      const b = dotPositions.get(to);
      if (!a || !b) return;
      const isBridge = kind === 'bridge';
      html += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
        stroke="var(--red)"
        stroke-width="${isBridge ? '1.55' : '1.15'}"
        stroke-linecap="round"
        stroke-dasharray="${isBridge ? 'none' : '2.5,4.5'}"
        opacity="${isBridge ? '.62' : '.28'}"
        style="pointer-events:none"/>`;
    });

    [...allFocusDots].forEach(dotKey => {
      const p = dotPositions.get(dotKey);
      if (!p) return;
      const isAnchor = FOCUS_PATH.anchors.includes(dotKey);
      html += `<circle cx="${p.x}" cy="${p.y}" r="${isAnchor ? 14 : 10}"
        fill="none" stroke="var(--red)" stroke-width="${isAnchor ? 1.5 : 1.1}"
        opacity="${isAnchor ? '.34' : '.16'}" style="pointer-events:none"/>`;
    });

    FOCUS_PATH.labels.forEach(([dotKey, label]) => {
      const p = dotPositions.get(dotKey);
      if (!p) return;
      html += `<text x="${p.x}" y="${p.y - 18}" text-anchor="middle"
        font-family="var(--mono)" font-size="7.5" font-weight="700" letter-spacing=".6"
        fill="var(--red)" opacity=".92" style="pointer-events:none">${label}</text>`;
    });

    html += `<text x="${CX}" y="${CY - 152}" text-anchor="middle"
      font-family="var(--mono)" font-size="10" font-weight="700" letter-spacing="1.4"
      fill="var(--red)" opacity=".92" style="pointer-events:none">FOCUS CONSTELLATION</text>`;
    html += `<text x="${CX}" y="${CY - 134}" text-anchor="middle"
      font-family="var(--font)" font-size="13" font-weight="600"
      fill="var(--tx)" opacity=".92" style="pointer-events:none">${FOCUS_PATH.title}</text>`;
    html += `<text x="${CX}" y="${CY - 116}" text-anchor="middle"
      font-family="var(--mono)" font-size="8.5" font-weight="500"
      fill="var(--tx-2)" opacity=".9" style="pointer-events:none">${FOCUS_PATH.subtitle}</text>`;
    html += `</g>`;
  }

  // ── Stakeholder nodes ────────────────────────────────────────────────
  STAKEHOLDERS.forEach(s => {
    const rad = (s.angle * Math.PI) / 180;
    const sx = CX + STK_R * Math.cos(rad);
    const sy = CY + STK_R * Math.sin(rad);

    // Connection lines to each ring (dashed, to ring edge)
    s.rings.forEach(rid => {
      const ring = RINGS.find(r => r.id === rid);
      const ex = CX + ring.r * Math.cos(rad);
      const ey = CY + ring.r * Math.sin(rad);
      html += `<line class="conn-line conn-${s.id} conn-ring-${rid}"
        x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}"
        stroke="${ring.color}" stroke-width="1" stroke-dasharray="4,3"
        opacity=".2" style="pointer-events:none;transition:opacity .15s"/>`;
    });

    // Node bg circle
    html += `<circle class="stk-node" data-stk="${s.id}"
      cx="${sx}" cy="${sy}" r="22"
      fill="var(--bg)" stroke="var(--border-2)" stroke-width="1.5"
      style="cursor:inherit;transition:all .15s"
      onmouseenter="showTooltip(event,'${s.id}')"
      onmouseleave="hideTooltip()"
      onclick="selectStk('${s.id}')"/>`;

    // Stakeholder ascii tag
    html += `<text x="${sx}" y="${sy+5}" text-anchor="middle"
      font-family="var(--mono)" font-size="16" font-weight="700"
      letter-spacing="0" fill="var(--tx-2)" style="pointer-events:none">${s.emoji}</text>`;

    // Label
    const labelOffset = sy > CY ? 40 : -34;
    html += `<text x="${sx}" y="${sy + labelOffset}" text-anchor="middle"
      font-family="var(--font)" font-size="11" font-weight="600"
      fill="var(--tx-2)" style="pointer-events:none">${s.name}</text>`;
  });

  html += `</g>`;
  svg.innerHTML = html;
  setupPanZoom();
}

// ─── DOT INTERACTIONS ─────────────────────────────────────────────────
function selectDot(e, dotKey) {
  if (Date.now() < suppressClickUntil) {
    e.preventDefault();
    e.stopPropagation();
    return;
  }
  e.stopPropagation();
  activeDotKey = dotKey === activeDotKey ? null : dotKey;
  activeRing   = null;
  activeStk    = null;
  updateHighlight();
  if (activeDotKey) openDotDetail(activeDotKey);
  else closeDetail();
}

function showDotTooltip(e, dotKey) {
  const [rid, fid] = dotKey.split(':');
  const ring = RINGS.find(r => r.id === rid);
  const feat = ring ? ring.features.find(f => f.id === fid) : null;
  if (!feat) return;
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-title').textContent = `${feat.id} · ${feat.short}`;
  document.getElementById('tt-body').textContent  = ring.label + ' · ' + ring.sub;
  tt.classList.add('show');
  moveTT(e);

  // Expand dot
  const dotEl = document.querySelector(`.feat-dot[data-dot="${dotKey}"]`);
  if (dotEl) dotEl.setAttribute('r', '7');
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
  // Restore all expanded dots
  document.querySelectorAll('.feat-dot').forEach(el => {
    const isActive = el.dataset.dot === activeDotKey;
    const isFocus = focusMode && FOCUS_PATH.nodes.includes(el.dataset.dot);
    const isAnchor = focusMode && FOCUS_PATH.anchors.includes(el.dataset.dot);
    if (isActive) return;
    el.setAttribute('r', isFocus ? (isAnchor ? '7.3' : '6.1') : '5.5');
  });
}

function openDotDetail(dotKey) {
  const [rid, fid] = dotKey.split(':');
  const ring = RINGS.find(r => r.id === rid);
  const feat = ring ? ring.features.find(f => f.id === fid) : null;
  if (!feat || !ring) return;

  // Find matching feature in groups by short name
  let matchedFeat = null;
  for (const g of ring.groups) {
    for (const f of g.feats) {
      // fuzzy match: check if group feat name contains short name keywords
      if (f.name.toLowerCase().includes(feat.short.toLowerCase().split(' ')[0].toLowerCase())) {
        matchedFeat = f;
        break;
      }
    }
    if (matchedFeat) break;
  }

  document.getElementById('detail-title').textContent = `${feat.id} · ${feat.short}`;

  let html = `<div class="dt-metric" style="margin-bottom:10px">
    <strong>Ring</strong>
    <span style="color:${ring.color}">${ring.label}</span> · ${ring.sub}
  </div>`;

  if (feat.phase) {
    html += `<div class="dt-metric" style="margin-bottom:10px">
      <strong>Phase</strong>${feat.phase}
      ${feat.phase === '1.0' ? ' · Auto Presence' : ''}
      ${feat.phase === '1.5' ? ' · Focus Memory' : ''}
      ${feat.phase === '2.0' ? ' · Open Platform' : ''}
      ${feat.phase === '2.5' ? ' · Team + AI-Adjacent' : ''}
    </div>`;
  }

  if (matchedFeat) {
    html += `<div class="dt-metric" style="margin-bottom:10px">
      <strong>Priority</strong>${matchedFeat.p} ${matchedFeat.name}
      ${matchedFeat.note ? `<div style="margin-top:4px;font-size:11px;color:var(--tx-3)">${matchedFeat.note}</div>` : ''}
    </div>`;
  }

  html += `<div class="dt-section"><div class="dt-sec-label">Ring overview</div>`;
  if (ring.gate) {
    html += `<div class="dt-item">${ring.gate}</div>`;
  }
  html += `</div>`;

  // List all features of this ring grouped by phase when relevant
  if (ring.id === 'r1' || ring.id === 'r2') {
    const phaseOrder = ring.id === 'r1'
      ? [['1.0', 'Ring 1 — Auto Presence'], ['1.5', 'Ring 1.5 — Focus Memory']]
      : [['2.0', 'Ring 2 — Open Platform'], ['2.5', 'Ring 2.5 — Team + AI-Adjacent']];
    phaseOrder.forEach(([phaseId, phaseLabel]) => {
      const phaseFeatures = ring.features.filter(f => f.phase === phaseId);
      if (!phaseFeatures.length) return;
      html += `<div class="dt-section"><div class="dt-sec-label">${phaseLabel}</div>`;
      phaseFeatures.forEach(f => {
        const isCurrent = f.id === fid;
        html += `<div class="dt-item" style="${isCurrent ? 'font-weight:600;color:var(--tx)' : ''}">
          <span class="dt-prio" style="color:${ring.color}">${f.id}</span>${f.short}
        </div>`;
      });
      html += `</div>`;
    });
  } else {
    html += `<div class="dt-section"><div class="dt-sec-label">All features in ${ring.label}</div>`;
    ring.features.forEach(f => {
      const isCurrent = f.id === fid;
      html += `<div class="dt-item" style="${isCurrent ? 'font-weight:600;color:var(--tx)' : ''}">
        <span class="dt-prio" style="color:${ring.color}">${f.id}</span>${f.short}
      </div>`;
    });
    html += `</div>`;
  }

  if (ring.metrics.length) {
    html += `<div class="dt-section"><div class="dt-sec-label">Метрики</div>`;
    ring.metrics.forEach(m => html += `<div class="dt-metric"><strong>${m.label}</strong>${m.val}</div>`);
    html += `</div>`;
  }

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail').classList.add('open');
}

// ─── ROADMAP VIEW ─────────────────────────────────────────────────────
function buildRoadmap() {
  const cols = document.getElementById('rm-cols');
  cols.innerHTML = RINGS.map((r,i) => `
    <div class="rm-col">
      <div class="rm-col-head">
        <div class="rm-ring-label" style="color:${r.color}">${r.label}</div>
        <div class="rm-ring-sub">${r.sub}</div>
        ${r.gate ? `<div class="rm-gate">${r.gate}</div>` : ''}
      </div>
      ${[...r.groups].sort((a, b) => {
        const order = {'1.0': 10, '1.5': 15, '2.0': 20, '2.5': 25};
        return (order[a.phase] || 0) - (order[b.phase] || 0);
      }).map(g => `
        <div class="rm-group"${g.phase ? ` data-phase="${g.phase}"` : ''}>
          <div class="rm-group-label">${g.label}</div>
          ${g.feats.map(f => {
            const featureId = featureIdForRoadmapItem(r.id, f.name);
            return `
            <div class="rm-feat"${featureId ? ` data-feature-id="${featureId}"` : ''}>
              <span class="rm-prio">${f.p}</span>
              <div>
                <div class="rm-feat-name">${f.name}</div>
                ${f.note ? `<div class="rm-feat-note">${f.note}</div>` : ''}
              </div>
            </div>
          `}).join('')}
        </div>
      `).join('')}
      ${r.metrics.length ? `
        <div class="sb-div"></div>
        <div class="rm-group-label" style="margin-bottom:8px">Метрики</div>
        ${r.metrics.map(m => `
          <div class="dt-metric"><strong>${m.label}</strong>${m.val}</div>
        `).join('')}
      ` : ''}
    </div>
  `).join('');
  updateRoadmapFocus();
}

function featureIdForRoadmapItem(ringId, name) {
  const map = {
    'r0': {
      'Pomodoro + кастомный таймер': '0.1',
      'Кнопка ручной смены статуса': '0.2',
      'WiFi 6 + Matter (сертиф. Feb 2026)': '0.12',
      'LED матрица 72×16px, RGB': '0.13',
    },
    'r1': {
      'Google Calendar → автостатус': '1.1',
      'Zoom / Meet / Teams → автодетект': '1.2',
      'Slack bidirectional sync': '1.12',
      'Shared URL (busy.app/status/name)': '1.11',
      'macOS app (menubar)': '1.9',
    },
    'r2': {
      'Developer Portal (docs.busy.app)': '2.3',
      'App Library — галерея с install в 1 клик': '2.4',
      'AI-агент монитор (Claude Code / Codex hooks)': '2.5',
      'Home Assistant нативная интеграция': '2.6',
      'Team Dashboard для менеджера': '2.10',
    },
    'r3': {
      'AI Focus Coach — персональные рекомендации': '3.1',
      'Предсказание пиков энергии / лучших часов': '3.2',
      'BUSY Bar Mini ($99–129)': '3.3',
      'Платные анимации, revenue sharing': '3.4',
      'Focus Score как публичный профиль': '3.5',
    }
  };
  return map[ringId]?.[name] ? `${ringId}:${map[ringId][name]}` : null;
}

function updateRoadmapFocus() {
  const focusNodes = new Set(FOCUS_PATH.nodes);
  const focusAnchors = new Set(FOCUS_PATH.anchors);
  const roadmapFeatures = document.querySelectorAll('.rm-feat');
  const roadmapGroups = document.querySelectorAll('.rm-group');

  if (!roadmapFeatures.length) return;

  if (!focusMode) {
    roadmapFeatures.forEach(el => el.classList.remove('focus-dim', 'focus-node', 'focus-anchor'));
    roadmapGroups.forEach(el => el.classList.remove('focus-dim'));
    return;
  }

  roadmapFeatures.forEach(el => {
    const fid = el.dataset.featureId;
    const isFocus = fid && focusNodes.has(fid);
    const isAnchor = fid && focusAnchors.has(fid);
    el.classList.toggle('focus-dim', !isFocus);
    el.classList.toggle('focus-node', !!isFocus);
    el.classList.toggle('focus-anchor', !!isAnchor);
  });

  roadmapGroups.forEach(group => {
    const hasFocus = !!group.querySelector('.rm-feat.focus-node, .rm-feat.focus-anchor');
    group.classList.toggle('focus-dim', !hasFocus);
  });
}

function buildInsights() {

  el.innerHTML = INSIGHTS.map(sec => `
    <div class="ins-section">
      <div class="ins-h">${sec.h}</div>

        <div class="ins-card">

          </div>

// ─── TIMELINE ─────────────────────────────────────────────────────────
function buildTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = RINGS.map((r, i) => `
    ${i > 0 ? '<div class="tl-arrow">→</div>' : ''}
    <div class="tl-block ${i===0?'active':''}" id="tlb-${r.id}" onclick="highlightRing('${r.id}')">
      <div class="tl-label" style="color:${r.color}">${r.label}</div>
      <div class="tl-sub">${r.short}</div>
      ${r.id === 'r1' ? '<div class="tl-focus-sub show">1.0 Auto Presence · 1.5 Focus Memory</div>' : ''}
      ${r.id === 'r2' ? '<div class="tl-focus-sub show">2.0 Open Platform · 2.5 Team + AI-Adjacent</div>' : ''}
    </div>
  `).join('');
}

function toggleFocusMode() {
  focusMode = !focusMode;
  syncFocusUI();
  if (activeTab === 'map') buildDiagram();
  if (activeTab === 'roadmap') updateRoadmapFocus();
  updateHighlight();
}

function syncFocusUI() {
  document.getElementById('focus-toggle')?.classList.toggle('active', focusMode);
  document.getElementById('focus-copy')?.classList.toggle('show', focusMode);
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────
function selectRing(rid) {
  if (Date.now() < suppressClickUntil) return;
  activeRing   = rid === activeRing ? null : rid;
  activeStk    = null;
  activeDotKey = null;
  updateHighlight();
  if (activeRing) openRingDetail(activeRing);
  else closeDetail();
  // sync timeline
  document.querySelectorAll('.tl-block').forEach(b => b.classList.remove('active'));
  if (activeRing) {
    const tb = document.getElementById('tlb-'+activeRing);
    if (tb) tb.classList.add('active');
  }
}

function highlightRing(rid) {
  selectRing(rid);
}

function selectStk(sid) {
  if (Date.now() < suppressClickUntil) return;
  activeStk    = sid === activeStk ? null : sid;
  activeRing   = null;
  activeDotKey = null;
  updateHighlight();
  if (activeStk) openStkDetail(activeStk);
  else closeDetail();
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  if (activeStk) document.getElementById('sbi-'+activeStk)?.classList.add('active');
}

function updateHighlight() {
  const allHitRings  = document.querySelectorAll('.ring-hit');
  const allDotGroups = document.querySelectorAll('.feat-dot-group');
  const allNodes     = document.querySelectorAll('.stk-node');
  const allLines     = document.querySelectorAll('.conn-line');
  const allSbi       = document.querySelectorAll('.sb-item');
  const focusDots    = new Set(FOCUS_PATH.nodes);
  const focusStakeholders = new Set(FOCUS_PATH.stakeholders);

  // Reset
  if (!activeRing && !activeStk && !activeDotKey) {
    if (focusMode) {
      allHitRings.forEach(el  => {
        const ringActive = [...focusDots].some(dotKey => dotKey.startsWith(el.dataset.ring + ':'));
        el.style.opacity = ringActive ? '.85' : '.12';
      });
      allDotGroups.forEach(el => {
        const ringActive = [...focusDots].some(dotKey => dotKey.startsWith(el.dataset.ring + ':'));
        el.style.opacity = focusDots.has(el.dataset.dot) ? '1' : (ringActive ? '.18' : '.08');
      });
      allNodes.forEach(el     => { el.style.opacity = focusStakeholders.has(el.dataset.stk) ? '1' : '.16'; });
      allLines.forEach(el => {
        const isFocusStakeholder = [...focusStakeholders].some(sid => el.classList.contains('conn-'+sid));
        const isFocusRing = [...focusDots].some(dotKey => el.classList.contains('conn-ring-'+dotKey.split(':')[0]));
        el.setAttribute('opacity', isFocusStakeholder && isFocusRing ? '.42' : '.04');
      });
      allSbi.forEach(el => {
        const sid = el.id.replace('sbi-','');
        el.classList.toggle('dimmed', !focusStakeholders.has(sid));
      });
    } else {
      allHitRings.forEach(el  => { el.style.opacity = '1'; });
      allDotGroups.forEach(el => { el.style.opacity = '1'; });
      allNodes.forEach(el     => { el.style.opacity = '1'; });
      allLines.forEach(el     => { el.style.opacity = ''; el.setAttribute('opacity','.2'); });
      allSbi.forEach(el       => el.classList.remove('dimmed'));
    }
    // Reset dot sizes
    document.querySelectorAll('.feat-dot').forEach(el => {
      const isAnchor = FOCUS_PATH.anchors.includes(el.dataset.dot);
      const r = focusMode && focusDots.has(el.dataset.dot) ? (isAnchor ? '7.3' : '6.1') : '5.5';
      el.setAttribute('r', r);
    });
    return;
  }

  if (activeDotKey) {
    const [rid] = activeDotKey.split(':');
    allDotGroups.forEach(el => {
      const isCurrent = el.dataset.dot === activeDotKey;
      const isSameRing = el.dataset.ring === rid;
      el.style.opacity = isCurrent ? '1' : (isSameRing ? '0.5' : '0.15');
    });
    allHitRings.forEach(el  => el.style.opacity = el.dataset.ring === rid ? '1' : '0.3');
    allNodes.forEach(el     => el.style.opacity = '0.4');
    allLines.forEach(el     => { el.style.opacity=''; el.setAttribute('opacity','.08'); });
    allSbi.forEach(el       => el.classList.remove('dimmed'));
    document.querySelectorAll('.feat-dot').forEach(el => {
      el.setAttribute('r', el.dataset.dot === activeDotKey ? '7' : '5.5');
    });
    return;
  }

  if (activeRing) {
    const stksInRing = STAKEHOLDERS.filter(s => s.rings.includes(activeRing)).map(s => s.id);
    allHitRings.forEach(el  => el.style.opacity = el.dataset.ring === activeRing ? '1' : '.2');
    allDotGroups.forEach(el => {
      el.style.opacity = el.dataset.ring === activeRing ? '1' : '0.15';
    });
    allNodes.forEach(el     => el.style.opacity = stksInRing.includes(el.dataset.stk) ? '1' : '.2');
    allLines.forEach(el => {
      const active = el.classList.contains('conn-ring-'+activeRing);
      el.setAttribute('opacity', active ? '.7' : '.04');
    });
    allSbi.forEach(el => {
      const sid = el.id.replace('sbi-','');
      el.classList.toggle('dimmed', !stksInRing.includes(sid));
    });
    document.querySelectorAll('.feat-dot').forEach(el => el.setAttribute('r','5.5'));
  }

  if (activeStk) {
    const stk = STAKEHOLDERS.find(s => s.id === activeStk);
    allHitRings.forEach(el  => el.style.opacity = stk.rings.includes(el.dataset.ring) ? '1' : '.2');
    allDotGroups.forEach(el => {
      el.style.opacity = stk.rings.includes(el.dataset.ring) ? '1' : '0.15';
    });
    allNodes.forEach(el     => el.style.opacity = el.dataset.stk === activeStk ? '1' : '.2');
    allLines.forEach(el => {
      const active = el.classList.contains('conn-'+activeStk);
      el.setAttribute('opacity', active ? '.9' : '.04');
    });
    allSbi.forEach(el => el.classList.remove('dimmed'));
    document.querySelectorAll('.feat-dot').forEach(el => el.setAttribute('r','5.5'));
  }
}

function openRingDetail(rid) {
  const r = RINGS.find(x => x.id === rid);
  document.getElementById('detail-title').textContent = `${r.label} · ${r.short}`;
  let html = '';
  if (r.gate) html += `<div class="dt-metric" style="margin-bottom:14px"><strong>Gate</strong>${r.gate}</div>`;
  r.groups.forEach(g => {
    html += `<div class="dt-section"><div class="dt-sec-label">${g.label}</div>`;
    g.feats.forEach(f => {
      html += `<div class="dt-item"><span class="dt-prio">${f.p}</span>${f.name}${f.note ? `<span class="dt-note">${f.note}</span>` : ''}</div>`;
    });
    html += `</div>`;
  });
  if (r.metrics.length) {
    html += `<div class="dt-section"><div class="dt-sec-label">Метрики</div>`;
    r.metrics.forEach(m => html += `<div class="dt-metric"><strong>${m.label}</strong>${m.val}</div>`);
    html += `</div>`;
  }
  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail').classList.add('open');
}

function openStkDetail(sid) {
  const s = STAKEHOLDERS.find(x => x.id === sid);
  document.getElementById('detail-title').textContent = `${s.emoji} ${s.name}`;
  const ringNames = s.rings.map(rid => {
    const r = RINGS.find(x => x.id === rid);
    return `<span style="color:${r.color}">${r.label}</span>`;
  }).join(', ');
  document.getElementById('detail-body').innerHTML = `
    <div class="dt-metric"><strong>Роль</strong>${s.role}</div>
    <div class="dt-metric"><strong>Приоритет</strong>${s.p}</div>
    <div class="dt-metric"><strong>Кольца</strong>${ringNames}</div>
  `;
  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  activeRing   = null;
  activeStk    = null;
  activeDotKey = null;
  updateHighlight();
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tl-block').forEach(el => el.classList.remove('active'));
}

// ─── TOOLTIP ──────────────────────────────────────────────────────────
function showTooltip(e, id) {
  const ring = RINGS.find(r => r.id === id);
  const stk  = STAKEHOLDERS.find(s => s.id === id);
  const tt   = document.getElementById('tooltip');
  if (ring) {
    document.getElementById('tt-title').textContent = `${ring.label} · ${ring.sub}`;
    document.getElementById('tt-body').textContent  = ring.gate || '';
  } else if (stk) {
    document.getElementById('tt-title').textContent = `${stk.emoji} ${stk.name}`;
    document.getElementById('tt-body').textContent  = stk.role;
  }
  tt.classList.add('show');
  moveTT(e);
}
function moveTT(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top  = (e.clientY - 8)  + 'px';
}
document.addEventListener('mousemove', moveTT);

// ─── TAB SWITCHING ────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('diagram').style.display      = tab==='map'      ? 'block' : 'none';
  document.getElementById('roadmap-view').style.display  = tab==='roadmap'  ? 'flex'  : 'none';
  document.getElementById('insights-view').style.display = tab==='insights' ? 'block' : 'none';
  if (tab === 'map') buildDiagram();
  if (tab === 'roadmap') updateRoadmapFocus();
}

// ─── PAN / ZOOM ───────────────────────────────────────────────────────
function applyTransform(animate) {
  const g = document.getElementById('g-root');
  if (!g) return;
  const transformValue = `translate(${svgPanX}px,${svgPanY}px) scale(${svgZoom})`;
  g.style.transformOrigin = '600px 480px';
  if (animate) {
    g.style.transition = 'transform .18s cubic-bezier(.25,.46,.45,.94)';
    g.style.transform  = transformValue;
    setTimeout(() => { g.style.transition = ''; }, 200);
  } else {
    g.style.transition = '';
    g.style.transform = transformValue;
  }
  document.getElementById('zoom-val').textContent = Math.round(svgZoom*100)+'%';
}
function zoom(factor) {
  svgZoom = Math.min(3, Math.max(.3, svgZoom * factor));
  applyTransform(true);
}
function zoomReset() { svgZoom=1; svgPanX=0; svgPanY=0; applyTransform(true); }

function setupPanZoom() {
  const svg = document.getElementById('diagram');
  if (!panZoomBound) {
    svg.addEventListener('mousedown', e => {
      if (activeTab !== 'map') return;
      if (e.button !== 0) return;
      isPanning = true;
      dragMoved = false;
      svg.classList.add('panning');
      panStart = {x: e.clientX - svgPanX, y: e.clientY - svgPanY};
      e.preventDefault();
    }, true);
    svg.addEventListener('click', e => {
      if (Date.now() < suppressClickUntil) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);
    window.addEventListener('mousemove', e => {
      if (!isPanning) return;
      const nextPanX = e.clientX - panStart.x;
      const nextPanY = e.clientY - panStart.y;
      if (Math.abs(nextPanX - svgPanX) > 2 || Math.abs(nextPanY - svgPanY) > 2) {
        dragMoved = true;
      }
      svgPanX = nextPanX;
      svgPanY = nextPanY;
      applyTransform();
    });
    window.addEventListener('mouseup', () => {
      if (dragMoved) suppressClickUntil = Date.now() + 120;
      isPanning = false;
      dragMoved = false;
      document.getElementById('diagram')?.classList.remove('panning');
    });
    svg.addEventListener('wheel', e => {
      if (activeTab !== 'map') return;
      e.preventDefault();
      const delta = -e.deltaY;
      const factor = 1 + Math.min(Math.abs(delta), 120) / 120 * 0.08;
      zoom(delta > 0 ? factor : 1 / factor);
    }, {passive:false});
    panZoomBound = true;
  }
}

// ─── THEME ────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? 'Dark' : 'Light';
  if (activeTab === 'map') buildDiagram();
}

// ─── INIT ─────────────────────────────────────────────────────────────
buildSidebar();
buildDiagram();
buildRoadmap();
buildInsights();
buildTimeline();
syncFocusUI();
