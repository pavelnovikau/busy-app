<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSY Bar · Product Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── BLUEPRINT ENGINEERING — RED PALETTE ─── */
:root {
  --bg:       #0E0808;
  --bg-2:     #160D0D;
  --surface:  #1E1111;
  --border:   rgba(239,68,68,.16);
  --border-2: rgba(239,68,68,.30);
  --tx:       #FAF0F0;
  --tx-2:     #C8A8A8;
  --tx-3:     #7A5050;
  --red:      #EF4444;
  --red-dim:  rgba(239,68,68,.10);
  --red-glow: 0 0 8px rgba(239,68,68,.35);
  --grid:     rgba(239,68,68,.06);
  --grid-maj: rgba(239,68,68,.12);
  --mono: 'Geist Mono', monospace;
  --sans: 'Geist', system-ui, sans-serif;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

html,body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg); color:var(--tx); font-family:var(--mono);
}
body {
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    linear-gradient(var(--grid-maj) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-maj) 1px, transparent 1px);
  background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
  background-position: -1px -1px;
}

/* ─── HEADER ─── */
#hd {
  position:fixed; top:0; left:0; right:0; z-index:500;
  height:46px;
  background:rgba(14,8,8,.94);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  display:flex; align-items:center; padding:0 18px; gap:0;
}
.hd-brand {
  display:flex; align-items:center; gap:7px;
  font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase;
  color:var(--tx); padding-right:14px; flex-shrink:0;
}
.hd-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--red); box-shadow:var(--red-glow);
}
.hd-sep { width:1px; height:16px; background:var(--border); margin:0 4px; flex-shrink:0; }
.hd-sub { font-size:9px; letter-spacing:.08em; color:var(--tx-3); padding-right:14px; flex-shrink:0; }
.tab-btn {
  font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
  padding:0 12px; height:46px; border:none; background:transparent;
  color:var(--tx-3); cursor:pointer; position:relative; transition:color .1s;
  white-space:nowrap;
}
.tab-btn:hover { color:var(--tx-2); }
.tab-btn.active { color:var(--red); }
.tab-btn.active::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height:1px; background:var(--red);
}
.hd-right { margin-left:auto; display:flex; align-items:center; gap:6px; flex-shrink:0; }
.focus-btn {
  font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  padding:0 10px; height:24px;
  border:1px solid var(--border); border-radius:2px;
  background:transparent; color:var(--tx-3); cursor:pointer;
  transition:all .1s; display:flex; align-items:center; gap:5px;
}
.focus-btn:hover { border-color:var(--red); color:var(--tx-2); }
.focus-btn.on { background:var(--red-dim); border-color:var(--red); color:var(--red); }
.focus-dot {
  width:4px; height:4px; border-radius:50%; background:currentColor;
  opacity:.5; transition:all .1s;
}
.focus-btn.on .focus-dot { opacity:1; box-shadow:0 0 4px var(--red); }
.hd-tag { font-size:8px; letter-spacing:.1em; color:var(--tx-3); }

/* ─── VIEWS WRAPPER ─── */
#views {
  position:fixed; top:46px; left:0; right:0; bottom:0; overflow:hidden;
}

/* ─── SCHEMATIC VIEW ─── */
#sv {
  position:absolute; inset:0;
  overflow:auto; cursor:crosshair;
}
#schematic {
  display:flex; align-items:stretch;
  min-height:100%; position:relative; min-width:max-content;
}

/* ─── ZONE ─── */
.zone {
  width:290px; flex-shrink:0;
  display:flex; flex-direction:column;
  border-right:1px solid var(--border);
}
.zone:last-child { border-right:none; }

.zone-hd {
  position:sticky; top:0; z-index:20;
  background:rgba(14,8,8,.96);
  border-bottom:1px solid var(--border);
  padding:14px 14px 12px;
  backdrop-filter:blur(8px);
}
.zone-ref {
  font-size:8px; font-weight:600; letter-spacing:.22em;
  color:var(--red); opacity:.6; display:block; margin-bottom:3px;
}
.zone-name {
  font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  color:var(--tx); display:block; margin-bottom:2px;
}
.zone-time {
  font-size:9px; color:var(--tx-3); display:block; letter-spacing:.03em;
}
.zone-gate {
  margin-top:8px; padding-top:7px; border-top:1px solid rgba(239,68,68,.08);
  display:block;
}
.zone-gate-kw {
  font-size:7px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color:var(--red); opacity:.6; display:block; margin-bottom:2px;
}
.zone-gate-txt {
  font-size:9px; color:var(--tx-3); line-height:1.45; display:block;
}

/* ─── GATE DIVIDER ─── */
.gate-div {
  width:32px; flex-shrink:0; position:relative;
  border-right:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
}
.gate-div-line {
  position:absolute; top:0; bottom:0; left:50%; width:1px;
  background:linear-gradient(to bottom, transparent, var(--border-2) 20%, var(--border-2) 80%, transparent);
}
.gate-div-txt {
  writing-mode:vertical-lr; transform:rotate(180deg);
  font-size:6px; letter-spacing:.2em; text-transform:uppercase;
  color:var(--red); opacity:.45;
  background:var(--bg); padding:6px 0; position:relative; z-index:1;
}

/* ─── FEATURE GROUP ─── */
.feat-group {
  border:1px solid rgba(239,68,68,.10);
  margin:10px 10px 0;
  position:relative;
}
.feat-group:last-child { margin-bottom:14px; }
.group-ref {
  position:absolute; top:-7px; left:8px;
  font-size:7px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--red); opacity:.55;
  background:var(--bg); padding:0 4px;
}
.group-hd {
  padding:7px 10px 5px;
  font-size:8px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--tx-3);
  display:flex; align-items:center; gap:6px;
  border-bottom:1px solid rgba(239,68,68,.07);
}
.group-phase {
  font-size:7px; padding:1px 4px;
  border:1px solid rgba(239,68,68,.18);
  color:var(--red); opacity:.6; letter-spacing:.1em;
}

/* ─── FEATURE ROW ─── */
.feat-row {
  display:flex; align-items:center;
  padding:5px 10px 5px 8px; gap:6px;
  cursor:pointer; transition:background .08s;
  border-bottom:1px solid rgba(239,68,68,.04);
  position:relative;
}
.feat-row:last-child { border-bottom:none; }
.feat-row:hover { background:rgba(239,68,68,.06); }

/* Focus states — applied when parent has .focus-on */
.focus-on .feat-row           { opacity:.2; }
.focus-on .feat-row.f-node    { opacity:1; background:rgba(239,68,68,.05); }
.focus-on .feat-row.f-anchor  {
  opacity:1; background:rgba(239,68,68,.12);
  border-bottom-color:rgba(239,68,68,.12);
}
.focus-on .feat-row.f-anchor::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:2px; background:var(--red); box-shadow:var(--red-glow);
}
.focus-on .feat-row.f-anchor .feat-id  { color:var(--red); }
.focus-on .feat-row.f-anchor .feat-name { color:var(--tx); }
.focus-on .feat-row.f-node .feat-id    { color:var(--red); opacity:.7; }
.focus-on .feat-row.f-node .feat-name  { color:var(--tx-2); }

.feat-id   { font-size:8px; color:var(--tx-3); min-width:26px; flex-shrink:0; letter-spacing:.03em; }
.feat-prio { font-size:9px; color:var(--tx-3); width:10px; flex-shrink:0; }
.feat-name { font-family:var(--sans); font-size:11.5px; color:var(--tx-2); flex:1; line-height:1.3; }
.feat-row:hover .feat-name { color:var(--tx); }

.feat-anch-tag {
  font-size:7px; letter-spacing:.1em; text-transform:uppercase;
  padding:1px 4px; border:1px solid rgba(239,68,68,.4);
  color:var(--red); background:var(--red-dim); flex-shrink:0; display:none;
}
.focus-on .f-anchor .feat-anch-tag { display:block; }

/* ─── CONNECTION SVG ─── */
#conn-svg {
  position:absolute; top:0; left:0; pointer-events:none; z-index:30;
  overflow:visible;
}
.c-trace {
  stroke:var(--red); stroke-width:1.5; fill:none;
  opacity:0; transition:opacity .22s;
  stroke-linejoin:round;
}
.c-dot {
  fill:var(--red); stroke:var(--bg); stroke-width:1.5;
  opacity:0; transition:opacity .22s;
}
.focus-on .c-trace { opacity:.7; }
.focus-on .c-dot   { opacity:1; }

/* ─── INSIGHTS VIEW ─── */
#iv {
  position:absolute; inset:0; display:none;
  overflow-y:auto; padding:40px 48px; cursor:default;
}
#iv.visible { display:block; }
.ins-wrap { max-width:720px; }
.ins-sec { margin-bottom:32px; }
.ins-sec-hd {
  font-size:9px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
  color:var(--tx); padding-left:10px; border-left:2px solid var(--red);
  margin-bottom:12px;
}
.ins-card {
  background:rgba(30,17,17,.8); border:1px solid var(--border);
  border-radius:2px; padding:14px 16px; margin-bottom:10px;
  transition:border-color .1s;
}
.ins-card:hover { border-color:var(--border-2); }
.ins-title { font-family:var(--sans); font-size:14px; font-weight:600; color:var(--tx); margin-bottom:6px; }
.ins-body  { font-family:var(--sans); font-size:13px; color:var(--tx-2); line-height:1.65; }
.ins-body strong { color:var(--tx); font-weight:600; }
.ins-tag {
  display:inline-block; font-size:8px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  padding:1px 5px; border-radius:1px; margin:0 4px 0 0;
}
.t-red { background:rgba(239,68,68,.12); color:var(--red); }
.t-or  { background:rgba(234,82,18,.12); color:#EA5212; }
.t-bl  { background:rgba(67,133,190,.12); color:#4385BE; }
.t-gr  { background:rgba(102,128,11,.12); color:#66800B; }

/* ─── DETAIL PANEL ─── */
#detail {
  position:fixed; top:46px; right:0; bottom:0; width:300px; z-index:400;
  background:rgba(12,6,6,.97); border-left:1px solid var(--border);
  backdrop-filter:blur(14px);
  transform:translateX(100%); transition:transform .18s;
  overflow-y:auto; padding:18px 16px;
}
#detail.open { transform:translateX(0); }
#d-close {
  position:absolute; top:10px; right:10px;
  width:20px; height:20px;
  border:1px solid var(--border); background:transparent;
  color:var(--tx-3); cursor:pointer; font-size:11px;
  display:flex; align-items:center; justify-content:center;
  transition:all .1s;
}
#d-close:hover { border-color:var(--red); color:var(--tx); }
#d-id   { font-size:9px; letter-spacing:.2em; color:var(--red); opacity:.7; margin-bottom:3px; }
#d-name { font-family:var(--sans); font-size:15px; font-weight:600; color:var(--tx); padding-right:28px; margin-bottom:3px; }
#d-ring { font-size:9px; color:var(--tx-3); letter-spacing:.05em; padding-bottom:12px; border-bottom:1px solid var(--border); margin-bottom:14px; }
.d-row  { display:flex; gap:8px; padding:5px 0; border-bottom:1px solid rgba(239,68,68,.05); align-items:baseline; }
.d-row:last-child { border-bottom:none; }
.d-lbl  { font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:var(--tx-3); min-width:64px; flex-shrink:0; padding-top:2px; }
.d-val  { font-family:var(--sans); font-size:11.5px; color:var(--tx-2); line-height:1.5; }

/* ─── LEGEND ─── */
#legend {
  position:fixed; bottom:16px; left:20px; z-index:100;
  display:flex; align-items:center; gap:14px;
  font-size:8px; letter-spacing:.1em; color:var(--tx-3);
  background:rgba(14,8,8,.88); border:1px solid var(--border);
  padding:5px 12px; border-radius:2px; backdrop-filter:blur(8px);
}
.leg-item { display:flex; align-items:center; gap:5px; }
.leg-dot  { width:5px; height:5px; border-radius:50%; background:var(--red); }
.leg-line { width:14px; height:1.5px; background:var(--red); opacity:.7; }
.leg-box  { width:8px; height:8px; border:1px solid rgba(239,68,68,.35); }
.leg-anch { width:8px; height:8px; border:1px solid var(--red); background:rgba(239,68,68,.12); }
</style>
</head>

// ─── STATE ────────────────────────────────────────────────────────
let focusOn = false;

// ─── BUILD SCHEMATIC ──────────────────────────────────────────────
function buildSchematic() {
  const sc = document.getElementById('schematic');
  const svg = document.getElementById('conn-svg');
  sc.innerHTML = '';
  sc.appendChild(svg);

  ZONES.forEach((zone, zi) => {
    if (zi > 0) {
      const gd = document.createElement('div');
      gd.className = 'gate-div';
      gd.innerHTML = `<div class="gate-div-line"></div><div class="gate-div-txt">GATE</div>`;
      sc.appendChild(gd);
    }

    const z = document.createElement('div');
    z.className = 'zone';
    z.id = 'z-' + zone.id;

    const hd = document.createElement('div');
    hd.className = 'zone-hd';
    hd.innerHTML = `
      <span class="zone-ref">${zone.ref}</span>
      <span class="zone-name">${zone.label}</span>
      <span class="zone-time">${zone.time}</span>
      ${zone.gate ? `<span class="zone-gate"><span class="zone-gate-kw">Gate →</span><span class="zone-gate-txt">${zone.gate}</span></span>` : ''}
    `;
    z.appendChild(hd);

    zone.groups.forEach((grp, gi) => {
      const g = document.createElement('div');
      g.className = 'feat-group';
      g.innerHTML = `
        <div class="group-ref">${grp.ref}</div>
        <div class="group-hd">
          ${grp.label}
          ${grp.phase ? `<span class="group-phase">${grp.phase}</span>` : ''}
        </div>
      `;
      grp.feats.forEach(fid => {
        const feat = F[fid];
        if (!feat) return;
        const isA = FOCUS.anchors.has(fid);
        const isN = FOCUS.nodes.has(fid);
        const row = document.createElement('div');
        row.className = `feat-row${isA ? ' f-anchor' : isN ? ' f-node' : ''}`;
        row.dataset.feat = fid;
        row.onclick = () => openDetail(fid);
        row.innerHTML = `
          <span class="feat-id">${fid}</span>
          <span class="feat-prio">${feat.prio}</span>
          <span class="feat-name">${feat.name}</span>
          ${isA ? '<span class="feat-anch-tag">Anchor</span>' : ''}
        `;
        g.appendChild(row);
      });
      z.appendChild(g);
    });

    sc.appendChild(z);
  });

  requestAnimationFrame(drawConnections);
}

// ─── DRAW CONNECTIONS ─────────────────────────────────────────────
function pos(id) {
  const el = document.querySelector(`[data-feat="${id}"]`);
  if (!el) return null;
  const sc = document.getElementById('schematic');
  const sv = document.getElementById('sv');
  const sr = sc.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  const sl = sv.scrollLeft, st = sv.scrollTop;
  return {
    left:  er.left  - sr.left + sl,
    right: er.right - sr.left + sl,
    midY:  (er.top + er.bottom)/2 - sr.top + st
  };
}

function drawConnections() {
  const sc  = document.getElementById('schematic');
  const svg = document.getElementById('conn-svg');
  const w   = sc.scrollWidth, h = sc.scrollHeight;
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

  let out = '';
  FOCUS.bridges.forEach(([a, b]) => {
    const pa = pos(a), pb = pos(b);
    if (!pa || !pb) return;
    const mx = (pa.right + pb.left) / 2;
    // Elbow trace: right → across → down/up → across → left
    const d = `M${pa.right},${pa.midY} L${mx},${pa.midY} L${mx},${pb.midY} L${pb.left},${pb.midY}`;
    out += `<path class="c-trace" d="${d}"/>`;
    out += `<circle class="c-dot" cx="${pa.right}" cy="${pa.midY}" r="3"/>`;
    out += `<circle class="c-dot" cx="${pb.left}"  cy="${pb.midY}" r="3"/>`;
    // Corner dots at bends
    out += `<circle class="c-dot" cx="${mx}" cy="${pa.midY}" r="1.5" opacity="0.5"/>`;
    out += `<circle class="c-dot" cx="${mx}" cy="${pb.midY}" r="1.5" opacity="0.5"/>`;
  });
  svg.innerHTML = out;
}

// ─── FOCUS TOGGLE ─────────────────────────────────────────────────
function toggleFocus() {
  focusOn = !focusOn;
  document.getElementById('focus-btn').classList.toggle('on', focusOn);
  document.getElementById('sv').classList.toggle('focus-on', focusOn);
  if (focusOn) requestAnimationFrame(drawConnections);
}

// ─── VIEW SWITCH ──────────────────────────────────────────────────
function switchView(v) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('sv').style.display  = v === 'schematic' ? 'block' : 'none';
  document.getElementById('iv').classList.toggle('visible', v === 'insights');
  document.getElementById('legend').style.display = v === 'schematic' ? 'flex' : 'none';
}

// ─── DETAIL PANEL ─────────────────────────────────────────────────
const RING_NAMES = {
  r0:'Ring 0 — Core Hardware',
  r1:'Ring 1 — Software Platform',
  r2:'Ring 2 — Open Platform',
  r3:'Ring 3 — Ecosystem'
};
function openDetail(id) {
  const f = F[id];
  if (!f) return;
  const isA = FOCUS.anchors.has(id);
  const isN = FOCUS.nodes.has(id);
  document.getElementById('d-id').textContent   = id;
  document.getElementById('d-name').textContent = f.name;
  document.getElementById('d-ring').textContent = RING_NAMES[f.ring] || f.ring;
  document.getElementById('d-body').innerHTML = `
    <div class="d-row">
      <div class="d-lbl">Priority</div>
      <div class="d-val">${f.prio === '●' ? 'High — Ship' : f.prio === '◐' ? 'Medium — Plan' : 'Low — Future'}</div>
    </div>
    ${f.phase ? `<div class="d-row"><div class="d-lbl">Phase</div><div class="d-val">${f.phase}</div></div>` : ''}
    <div class="d-row">
      <div class="d-lbl">Constellation</div>
      <div class="d-val">${isA ? '★ Anchor — critical path node' : isN ? '◦ Node — supporting' : '— not in path'}</div>
    </div>
  `;
  document.getElementById('detail').classList.add('open');
}
function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}

// ─── BUILD INSIGHTS ───────────────────────────────────────────────
function buildInsights() {
  document.getElementById('ins-inner').innerHTML = INSIGHTS.map(s => `
    <div class="ins-sec">
      <div class="ins-sec-hd">${s.h}</div>
      ${s.cards.map(c => `
        <div class="ins-card">
          <div class="ins-title"><span class="ins-tag ${c.tc}">${c.tl}</span>${c.title}</div>
          <div class="ins-body">${c.body}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ─── SCROLL + RESIZE → REDRAW ─────────────────────────────────────
document.getElementById('sv').addEventListener('scroll', drawConnections);
window.addEventListener('resize', () => { drawConnections(); });

// ─── INIT ─────────────────────────────────────────────────────────
buildSchematic();
buildInsights();
</script>
